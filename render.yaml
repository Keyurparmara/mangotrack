services:
  - type: web
    name: mangotrack
    env: python
    buildCommand: "pip install -r requirements.txt && cd mango-frontend && npm install && npm run build && cp -r dist ../ && cd .."
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mangotrack-db
          property: connectionString

databases:
  - name: mangotrack-db
    databaseName: mangotrack
    user: mangotrack
